version: 1
vault:
  name: ai-memory-vault
  description: AI-maintained development memory, skill, and workflow vault.
  protocol: VAULT_PROTOCOL.md

global_assets:
  - id: global-instructions
    type: global
    title: Global AI instructions
    path: global/instructions.md
    scope: global
    visibility: public
    tags: [agent, instructions, behavior]
    match:
      always: true
  - id: coding-style
    type: global
    title: Coding style and verification rules
    path: global/coding-style.md
    scope: both
    visibility: public
    tags: [coding, testing, quality]
    match:
      always: true
  - id: user-preferences
    type: global
    title: User preferences
    path: global/user-preferences.md
    scope: global
    visibility: private
    tags: [preferences, user]

skills:
  - id: vault-maintainer
    type: skill
    title: AI Memory Vault Maintainer
    path: skills/vault-maintainer/SKILL.md
    scope: global
    visibility: public
    tags: [vault, memory, sync, claim, export]
    match:
      always: true
      keywords: [vault, memory, summarize, claim, restore, sync]
  - id: claude-code-memory
    type: skill
    title: Claude Code memory migration and claiming
    path: skills/claude-code-memory/SKILL.md
    scope: both
    visibility: public
    tags: [claude-code, memory, migration]
    match:
      files: [CLAUDE.md, .claude]

patterns:
  - id: debugging-patterns
    type: pattern
    title: Debugging patterns
    path: patterns/debugging/README.md
    scope: both
    visibility: public
    tags: [debugging, bugs]
    match:
      languages: [javascript, python, go, rust, swift]
  - id: deployment-patterns
    type: pattern
    title: Deployment patterns
    path: patterns/deployment/README.md
    scope: both
    visibility: public
    tags: [deploy, docker, ci]
    match:
      files: [Dockerfile, docker-compose.yml, docker-compose.yaml]
      frameworks: [docker]

projects: []
